<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stone Museum</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="overlay"></div>

  <div class="stones">

    <img src="images/stone1.png" class="stone" onclick="openInfo(0)" />
    <img src="images/stone2.png" class="stone" onclick="openInfo(1)" />
    <img src="images/stone3.png" class="stone" onclick="openInfo(2)" />
    <img src="images/stone4.png" class="stone" onclick="openInfo(3)" />
    <img src="images/stone5.png" class="stone" onclick="openInfo(4)" />

  </div>

  <div id="popup" class="popup hidden">
    <div class="popup-content">
      <button class="close" onclick="closeInfo()">×</button>

      <h2 id="title"></h2>
      <p id="description"></p>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
